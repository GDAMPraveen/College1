<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather Dashboard</title>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Weather Dashboard</h1>
            <input type="text" placeholder="Search city..." class="search-box">
        </header>

        <div class="current-weather">
            <h2>Chennai</h2>
            <div class="temperature">32°C ☀</div>
            <p>Sunny</p>
        </div>
        
        <div class="forecast">
            <div class="card">
                <h3>Sun</h3>
                <p>30°C ⛅</p>
            </div>
            
            <div class="card">
                <h3>Mon</h3>
                <p>30°C ⛅</p>
            </div>
            
            <div class="card">
                <h3>Tue</h3>
                <p>30°C ⛅</p>
            </div>
            
            <div class="card">
                <h3>Wed</h3>
                <p>30°C ⛅</p>
            </div>
            
            <div class="card">
                <h3>Thu</h3>
                <p>30°C ⛅</p>
            </div>
            
            <div class="card">
                <h3>Fri</h3>
                <p>30°C ⛅</p>
            </div>
            
            <div class="card">
                <h3>Sat</h3>
                <p>30°C ⛅</p>
            </div>
        </div>
    </div>
</body>
